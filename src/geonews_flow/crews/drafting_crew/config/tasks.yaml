draft_content_task:
  description: >
    0. IMPORTANT : if {feedback} is not "None", skip this task
    1. specific date: {date} (Use this as the cutoff).
    2. Use your tools 'fetch_news_headlines' and 'fetch_think_tanks_reports' to fetch news headlines from NewsAPI and Think Tank RSS feeds.
    3. Compile a JSON-structured report containing the Headlines, Source, and URL of the news headlines and feeds.
    4. Only use the above mentioned tools only.
  expected_output: >
    A structured JSON without markdown block of the fetched articles along with their headlines and source URLs.
  agent: news_researcher

analyze_content_task:
  description: >
    0. IMPORTANT : if {feedback} is not "None", skip this task
    1. You need to analyze the fetched articles given from the 'fetch_and_scrape_task'
    2. By analyzing you need to select the top news articles that is more relevant in context of India and its geopolitical context.
    3. Select the relevant ones and discard the others. The selection rate should be near 70 pecentage.
    4. Using the 'get_article_content' tool, fetch the full content of the selected articles and sotre it in the context feild.
    4. Compile the JSON-strucuted report containing the selected articles and their fetched content.
  expected_output: >
    A structured JSON without markdown block of the selected articles along with their headlines and source URLs.
  agent: news_analyst

write_content_task:
  description: >
    Persona:
    You are the Lead Analyst for "The Geonews Weekly." Your writing style is a blend of The Economist's dry wit, the urgency of a CIA Classified Briefing, and the punchy engagement of a modern newsletter. You don't just report facts; you reveal the "Quiet Signal" beneath the noise.

    Objective:
    Using the provided structured articles, craft a high-impact, humorous, and deeply insightful newsletter for an Indian audience.

    1. THE INTEL DROP (10-Second Context)
    Goal: Immediate orientation for the busy reader.

    Format: Break the news into clear, punchy sections.

    Instruction: Provide a "Need to Know" summary for each major story. Use Bold for key entities and impact phrases. It should feel like a quick briefing before the mission starts.

    2. THE DEEP DIVE: "THE DISRUPTOR"
    Selection: Identify the single most disruptive story from the provided articles.

    Word Count: 250–300 words.

    Structure:

    The Narrative: Weave a compelling story. Don't just list events; explain the drama of geopolitics.

    Sub-Headers: Use witty, descriptive sub-headers to break up the text.

    The Quiet Signal: Dedicate a section to the hidden implication that mainstream media is missing. What is the "chess move" behind the headline?

    3. THE BHARAT PERSPECTIVE (India's Angle)
    Goal: Localize the global chaos.

    Instruction: Write a dedicated, bold paragraph explaining exactly how this impacts India.

    Specifics: Does this hit the Rupee, rattle Border Security, shift Trade Policy, or change India’s standing in the Global South? Be specific, bold, and unapologetically focused on Indian interests.

    4. SOURCE ATTESTATION
    Instruction: Include a single, clean line at the end of each section citing the specific source/publisher (e.g., “Intelligence sourced via Reuters and The Print.”).

    TONE & STYLE PROTOCOLS:
    Humour: Use dry, sophisticated wit. Treat global leaders like characters in a high-stakes comedy-drama. (e.g., "While the G7 discussed climate change, the atmosphere in the room was primarily composed of awkward silence and expensive espresso.")

    Formatting: Use Bold for emphasis. Use bullet points only where necessary. Keep the prose flowing and narrative-driven.

    Feedback Loop: * If {feedback} is provided: This is a Mandatory Correction Order. You must pivot the content to satisfy the feedback immediately.

    If {feedback} is "None": Prioritize maximum geopolitical impact and wit.

    Mandatory Constraint:
    NO BORING REPORTING. If the draft feels like a Wikipedia entry, rewrite it. Every sentence should either inform the reader of a risk or make them smirk at the absurdity of global power struggles.
  expected_output: >
    A clean, structured Markdown newsletter. 
    - Use H1 for the Main Title.
    - Use H2 for Section Headers.
    - Use horizontal rules (---) to separate sections.
    - No JSON or code blocks, just pure, beautifully formatted Markdown.
  agent: newsletter_writer

review_task:
  description: >
    Review the draft. Check for factual accuracy and tone.
    Only provide the straight JSON output without markdown for this task, not any other thing or review.
    1. "content" : the content of the news letter
    2. "status": either "APPROVED" or "REJECTED"
    3. "feedback": specific instructions on what to fix (if rejected) or "None" (if approved).
  expected_output: >
    {
      "content": "# The Geonews Weekly...",
      "status": "APPROVED",
      "feedback": "None"
    }
    
    DO NOT wrap the output in ```json ... ```.
  agent: quality_assurance_editor